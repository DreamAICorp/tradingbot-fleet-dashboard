# AUTO-GENERATED by ci-cd-control-plane@edfee172b2753e0b4755b694c8362509b408b85f.
# Source: templates/ci.typescript.yml.tmpl
# TypeScript / Node.js variant of the CI standard.
# Same job names as ci.python.yml.tmpl so branch_protection.json works for both.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: |
          if [ ! -f package.json ]; then
            echo "no root package.json — skipping install (monorepo with subdirectory packages may need a root workspaces manifest)"
            exit 0
          fi
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable && yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Lint (eslint or biome — try in order)
        run: |
          if [ -f biome.json ] || [ -f biome.jsonc ]; then
            npx @biomejs/biome ci .
          elif [ -f .eslintrc ] || [ -f .eslintrc.js ] || [ -f .eslintrc.json ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npx eslint . --max-warnings 0 || echo "::warning::eslint found issues (brownfield phase)"
          elif grep -q '"lint"' package.json 2>/dev/null; then
            npm run lint || echo "::warning::npm run lint found issues (brownfield phase)"
          else
            echo "no lint config — skipping"
          fi
      - name: Format check (prettier — optional)
        run: |
          if [ -f .prettierrc ] || [ -f .prettierrc.json ] || [ -f .prettierrc.js ] || grep -q '"prettier"' package.json 2>/dev/null; then
            npx prettier --check . || echo "::warning::prettier diff (brownfield)"
          else
            echo "no prettier — skipping"
          fi

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: |
          if [ ! -f package.json ]; then
            echo "no root package.json — skipping install (monorepo with subdirectory packages may need a root workspaces manifest)"
            exit 0
          fi
          if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then corepack enable && yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          else npm install; fi
      - name: tsc --noEmit
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || echo "::warning::tsc found type errors (brownfield phase)"
          else
            echo "no tsconfig.json — skipping"
          fi

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: |
          if [ ! -f package.json ]; then
            echo "no root package.json — skipping install (monorepo with subdirectory packages may need a root workspaces manifest)"
            exit 0
          fi
          if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then corepack enable && yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          else npm install; fi
      - name: Run unit tests (vitest > jest > npm test)
        run: |
          if [ -f vitest.config.ts ] || [ -f vitest.config.js ] || grep -q '"vitest"' package.json 2>/dev/null; then
            npx vitest run --passWithNoTests
          elif [ -f jest.config.ts ] || [ -f jest.config.js ] || grep -q '"jest"' package.json 2>/dev/null; then
            npx jest --passWithNoTests
          elif grep -q '"test"' package.json 2>/dev/null; then
            npm test --if-present
          else
            echo "no unit test framework — skipping"
          fi

  integration:
    # TS integration tests live in tests/integration/ or __tests__/integration/
    # by convention. Same runner pattern as unit.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: |
          if [ ! -f package.json ]; then
            echo "no root package.json — skipping install (monorepo with subdirectory packages may need a root workspaces manifest)"
            exit 0
          fi
          if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then corepack enable && yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          else npm install; fi
      - name: Run integration tests
        run: |
          target=""
          for d in tests/integration __tests__/integration; do
            if [ -d "$d" ] && find "$d" \( -name "*.test.ts" -o -name "*.test.js" -o -name "*.spec.ts" -o -name "*.spec.js" \) | grep -q .; then
              target="$d"; break
            fi
          done
          if [ -n "$target" ]; then
            if [ -f vitest.config.ts ] || [ -f vitest.config.js ]; then npx vitest run "$target" --passWithNoTests
            elif [ -f jest.config.ts ] || [ -f jest.config.js ]; then npx jest "$target" --passWithNoTests
            else npm test --if-present -- "$target"; fi
          else
            echo "no integration tests — skipping"
          fi

  e2e:
    # Playwright is the convention for TS e2e. The CLI returns 0 when no
    # tests match; we still guard for missing config.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: |
          if [ ! -f package.json ]; then
            echo "no root package.json — skipping install (monorepo with subdirectory packages may need a root workspaces manifest)"
            exit 0
          fi
          if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then corepack enable && yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          else npm install; fi
      - name: Run e2e (Playwright)
        run: |
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ]; then
            npx playwright install --with-deps chromium
            npx playwright test || echo "::warning::playwright failures (brownfield phase)"
          else
            echo "no playwright config — skipping"
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: npm audit
        run: |
          if [ -f package-lock.json ] || [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
            npm audit --audit-level=high || echo "::warning::npm audit found high-severity issues (brownfield phase)"
          else
            echo "no lockfile — skipping npm audit"
          fi
      - name: gitleaks (direct CLI — license-free)
        run: |
          set -e
          ver=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner -v --exit-code 1 --redact || \
            (echo "::warning::gitleaks found potential secrets" && exit 0)

  compliance:
    # Same gatekeeper as Python repos — Python is available on GH runners by default.
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml
      - run: python scripts/compliance.py
