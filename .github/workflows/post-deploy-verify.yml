# AUTO-GENERATED by ci-cd-control-plane@93a52ff717a630f9215e0aabdbe75552a5aef4b7.
# Source: templates/post-deploy-verify.yml.tmpl
# Per CI/CD Standard Section 5 — the gate that stops 8h silent regressions.
# On any failure: auto-revert to previous green tag (D-06 accepted 2026-05-13).

name: post-deploy-verify

on:
  workflow_call:
    inputs:
      deploy_sha:
        required: true
        type: string
      service:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      deploy_sha:
        required: true
        type: string
      kind:
        required: false
        type: choice
        options: [docker, systemd, both]
        default: both

concurrency:
  group: post-deploy-verify
  cancel-in-progress: false

permissions:
  contents: write  # for auto-revert tag

jobs:
  verify:
    runs-on: [self-hosted, {{DEPLOY_HOST_LABEL}}]
    timeout-minutes: 10
    env:
      DEPLOY_SHA: ${{ inputs.deploy_sha }}
      API_BASE: {{API_BASE_URL}}
      PROBE_PATH: {{API_PROBE_PATH}}
    steps:
      - name: 1/5 — runtime SHA matches deploy SHA
        run: |
          set -e
          {{RUNTIME_SHA_CHECK}}
          if [ "$runtime_sha" != "$DEPLOY_SHA" ]; then
            echo "::error::runtime_sha=$runtime_sha != deploy_sha=$DEPLOY_SHA"
            echo "RUNTIME_DRIFT=1" >> "$GITHUB_ENV"
          fi

      - name: 2/5 — service liveness (Δfailed=0)
        run: |
          {{LIVENESS_CHECK}}

      - name: 3/5 — API contract probe (operator URL, real JSON shape)
        run: |
          body=$(curl -sk --max-time 15 "$API_BASE$PROBE_PATH")
          echo "$body" | python3 -c "import sys, json; d=json.load(sys.stdin); assert isinstance(d, (list, dict)), 'expected JSON object/array'; print('probe OK', len(d) if hasattr(d,'__len__') else 'ok')"

      - name: 4/5 — parity replay green
        run: |
          {{PARITY_REPLAY_CHECK}}

      - name: 5/5 — self-test (verifier itself reachable + parsable)
        run: |
          code=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "$API_BASE$PROBE_PATH" || echo 000)
          if [ "$code" = "000" ] || [ "$code" -ge 500 ]; then
            echo "::error::self-test FAILED — base URL $API_BASE$PROBE_PATH returned $code"
            echo "This means the verifier itself is broken. Halt-on-RED applies."
            exit 1
          fi

      - name: Auto-revert on any failure (D-06)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prev_tag=$(git tag --sort=-creatordate | head -1)
          if [ -z "$prev_tag" ]; then
            echo "::error::no previous tag to revert to — page operator"
            exit 1
          fi
          echo "::warning::Auto-reverting to $prev_tag (deploy $DEPLOY_SHA failed verification)"
          gh workflow run rollback.yml -f tag="$prev_tag" -f reason="auto-revert: post-deploy-verify failed on $DEPLOY_SHA"
          # Post Sona note
          curl -sk -X POST -H "Content-Type: application/json" \
            -d "{\"kind\":\"alert\",\"text\":\"AUTO-REVERT: $DEPLOY_SHA → $prev_tag (post-deploy-verify failed)\"}" \
            "https://sona.taila762b3.ts.net/api/sprints/{{SONA_SPRINT_ID}}/notes" --max-time 10 || true
