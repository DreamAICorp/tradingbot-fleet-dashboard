# AUTO-GENERATED by ci-cd-control-plane@93a52ff717a630f9215e0aabdbe75552a5aef4b7.
# Source: templates/drift-watcher.yml.tmpl
#
# LOCK #3 of the anti-drift system (see standard.md §0).
# Every day at 02:00 UTC, audit each non-main branch:
#   - How many commits ahead of main?
#   - How many commits behind main?
# If ahead > MAX_AHEAD (default 5) → open an issue tagged `drift-watch` listing
# the branch + recommended action (rebase + merge OR delete).
#
# Effect: a 47-commit-ahead branch like the v0.1 mess can no longer accumulate
# silently. The operator gets a daily nudge as soon as drift crosses threshold.

name: drift-watcher

on:
  schedule:
    - cron: '0 2 * * *'  # daily 02:00 UTC
  workflow_dispatch:
    inputs:
      max_ahead:
        description: 'Open issue when a branch is more than this many commits ahead of main'
        required: false
        default: '5'

concurrency:
  group: drift-watcher
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      MAX_AHEAD: ${{ github.event.inputs.max_ahead || '5' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Detect drift
        id: detect
        run: |
          set -e
          git fetch origin --prune
          drift_report=""
          while IFS= read -r branch; do
            branch="${branch##refs/remotes/origin/}"
            [ "$branch" = "main" ] && continue
            [ -z "$branch" ] && continue
            ahead=$(git rev-list --count "origin/main..origin/$branch" 2>/dev/null || echo 0)
            behind=$(git rev-list --count "origin/$branch..origin/main" 2>/dev/null || echo 0)
            if [ "$ahead" -gt "$MAX_AHEAD" ]; then
              drift_report="$drift_report\n- \`$branch\`: $ahead ahead / $behind behind of main"
              echo "DRIFT: $branch ahead=$ahead behind=$behind"
            fi
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin/)

          if [ -n "$drift_report" ]; then
            {
              echo "report<<EOF"
              echo -e "$drift_report"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "found_drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "found_drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update drift-watch issue
        if: steps.detect.outputs.found_drift == 'true'
        env:
          DRIFT_REPORT: ${{ steps.detect.outputs.report }}
        run: |
          existing=$(gh issue list --label drift-watch --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          body=$(cat <<EOF
          The drift-watcher detected branches more than $MAX_AHEAD commits ahead of \`main\`. Trunk-based discipline (standard §0) says short-lived feature branches only — these need to either land via PR or be deleted.

          $DRIFT_REPORT

          **Recommended action:**
          1. For each listed branch: open or update the PR, rebase on \`main\`, request CI green, merge.
          2. If the branch is abandoned: delete it (\`gh api -X DELETE repos/.../git/refs/heads/<branch>\`).
          3. After cleanup, this issue auto-closes on the next drift-watcher run.

          This issue is opened by the \`drift-watcher\` workflow. Do not close it manually; close it by removing the underlying drift.
          EOF
          )
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
            echo "updated existing drift-watch issue #$existing"
          else
            gh issue create --title "🚨 drift-watch: branch(es) exceed ahead-threshold" \
              --body "$body" --label drift-watch || \
            gh issue create --title "🚨 drift-watch: branch(es) exceed ahead-threshold" \
              --body "$body"
          fi

      - name: Close drift-watch issue if no drift
        if: steps.detect.outputs.found_drift == 'false'
        run: |
          existing=$(gh issue list --label drift-watch --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "Drift resolved — no branch > $MAX_AHEAD commits ahead of main." || true
          fi
