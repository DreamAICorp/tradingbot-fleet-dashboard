# AUTO-GENERATED by ci-cd-control-plane@93a52ff717a630f9215e0aabdbe75552a5aef4b7.
# Source: templates/rollback.yml.tmpl
# Per CI/CD Standard Section 7. The ONLY sanctioned rollback path.
# Manual SSH rollback is NOT permitted — leaves no audit trail.

name: rollback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to roll back to (must exist on origin)'
        required: true
        type: string
      reason:
        description: 'Why this rollback (audit trail)'
        required: true
        type: string

concurrency:
  group: rollback
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rollback:
    runs-on: [self-hosted, {{DEPLOY_HOST_LABEL}}]
    timeout-minutes: 15
    env:
      TB_ROOT: {{REPO_ROOT_ON_HOST}}
      TAG: ${{ inputs.tag }}
      REASON: ${{ inputs.reason }}
    steps:
      - name: Verify tag exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh api repos/DreamAICorp/tradingbot-fleet-dashboard/git/refs/tags/$TAG >/dev/null 2>&1; then
            echo "::error::tag $TAG does not exist on origin"
            exit 1
          fi

      - name: Halt all paper runners (avoid in-flight state crossing versions)
        run: |
          {{HALT_COMMAND}}

      - name: Checkout tag on deploy host
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$TB_ROOT"
          git config --global --add safe.directory "$TB_ROOT"
          AUTH="https://x-access-token:${GH_TOKEN}@github.com/DreamAICorp/tradingbot-fleet-dashboard.git"
          git fetch "$AUTH" --tags
          git checkout "tags/$TAG"
          echo "rollback_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Re-deploy at tag SHA
        run: |
          {{REDEPLOY_AT_SHA_COMMAND}}

      - name: Post-rollback verify (lightweight — just liveness + API probe)
        run: |
          sleep 10
          {{LIVENESS_CHECK}}
          curl -sfk --max-time 10 "{{API_BASE_URL}}{{API_PROBE_PATH}}" >/dev/null

      - name: Open forensics PR with the failing diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          incident_id="incident-$(date -u +%Y%m%d%H%M)"
          branch="fix/$incident_id"
          # Just open a placeholder PR — the operator fills in the postmortem
          git checkout -b "$branch" "tags/$TAG"
          mkdir -p notes/incidents
          cat > "notes/incidents/$incident_id.md" <<EOF
          # $incident_id

          **Rolled back to:** $TAG ($rollback_sha)
          **Reason:** $REASON
          **Triggered:** $(date -u)

          ## What broke

          (Fill in: which check failed in post-deploy-verify? logs? screenshots?)

          ## Root cause

          (Fill in)

          ## Fix path

          (Fill in: which PR will land the corrected change?)
          EOF
          git add notes/incidents
          git commit -m "ops: $incident_id — auto-opened by rollback workflow"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "ops: $incident_id" \
            --body "Auto-opened by rollback workflow.
Tag rolled back: $TAG
Reason: $REASON

@operator — please fill in the root cause + fix plan in notes/incidents/$incident_id.md before merging this PR." || true

      - name: Sona note
        run: |
          curl -sk -X POST -H "Content-Type: application/json" \
            -d "{\"kind\":\"alert\",\"text\":\"ROLLBACK to $TAG — reason: $REASON\"}" \
            "https://sona.taila762b3.ts.net/api/sprints/{{SONA_SPRINT_ID}}/notes" --max-time 10 || true
