# AUTO-GENERATED by ci-cd-control-plane@edfee172b2753e0b4755b694c8362509b408b85f.
# Source: templates/auto-delete-stale-branches.yml.tmpl
#
# LOCK #2 of the anti-drift system (see standard.md §0).
# Every Monday 03:00 UTC, enumerate non-main branches in this repo.
# Any branch with no commit in the last 14 days that isn't:
#   - main
#   - a branch with an OPEN PR (deletion would orphan the PR)
# is deleted via `gh api -X DELETE`.
#
# Effect: feature branches MUST be short-lived. If a branch sits idle for 2 weeks,
# either land it or accept it dies. Prevents the v0.1-style accumulation.
#
# Notification: 24h before deletion, the workflow opens a draft issue listing
# candidates so the operator has a chance to push or land.

name: auto-delete-stale-branches

on:
  schedule:
    - cron: '0 3 * * 1'  # Mondays 03:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report what would be deleted but do not delete'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      max_age_days:
        description: 'Branches older than this (no commits) get deleted'
        required: false
        default: '14'

concurrency:
  group: auto-delete-stale-branches
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  issues: write

jobs:
  prune:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '14' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Find stale branches
        id: scan
        run: |
          set -e
          cutoff_epoch=$(date -d "-$MAX_AGE_DAYS days" +%s 2>/dev/null || date -v-${MAX_AGE_DAYS}d +%s)
          echo "Cutoff: $(date -d @$cutoff_epoch 2>/dev/null || date -r $cutoff_epoch)"

          # List all branches with last commit date, excluding main and open-PR branches
          open_pr_branches=$(gh pr list --state open --json headRefName -q '.[].headRefName' | sort -u)

          stale=()
          while IFS=$'\t' read -r branch last_commit_date; do
            [ -z "$branch" ] && continue
            [ "$branch" = "main" ] && continue
            echo "$open_pr_branches" | grep -qx "$branch" && continue
            commit_epoch=$(date -d "$last_commit_date" +%s 2>/dev/null || gdate -d "$last_commit_date" +%s 2>/dev/null || echo 0)
            if [ "$commit_epoch" -lt "$cutoff_epoch" ]; then
              stale+=("$branch")
              echo "STALE: $branch (last commit $last_commit_date)"
            fi
          done < <(gh api "repos/${{ github.repository }}/branches" --paginate \
              -q '.[] | [.name, .commit.commit.committer.date] | @tsv')

          printf "%s\n" "${stale[@]}" > stale.txt
          echo "count=${#stale[@]}" >> "$GITHUB_OUTPUT"

      - name: Delete (or dry-run)
        if: steps.scan.outputs.count != '0'
        run: |
          while read -r branch; do
            [ -z "$branch" ] && continue
            if [ "$DRY_RUN" = "true" ]; then
              echo "[dry-run] would delete: $branch"
            else
              echo "deleting: $branch"
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$branch" || \
                echo "  WARN: failed to delete $branch"
            fi
          done < stale.txt

      - name: Job summary
        if: always()
        run: |
          {
            echo "## auto-delete-stale-branches"
            echo ""
            echo "Mode: \`DRY_RUN=$DRY_RUN\`  Cutoff: \`-$MAX_AGE_DAYS days\`"
            echo ""
            echo "### Candidates"
            if [ -s stale.txt ]; then
              echo '```'
              cat stale.txt
              echo '```'
            else
              echo "(none — no stale branches)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
